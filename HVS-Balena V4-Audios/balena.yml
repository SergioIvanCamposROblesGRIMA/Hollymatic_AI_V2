# balena.yml para la plataforma de IA Hollymatic
name: Hollymatic AI Platform
type: sw.application
description: >-
  Una plataforma de Inteligencia Artificial diseñada para optimizar
  el proceso de ensamblaje de productos Hollymatic utilizando una Raspberry Pi 4.

post-provisioning: >-
  ## Instrucciones de Uso


  **Descarga de la aplicación**

  Una vez que enciendas tu dispositivo, dale unos 5-10 minutos para que descargue
  todos los contenedores de la aplicación. El tiempo puede variar según tu conexión a internet.


  **Funcionamiento**

  Cuando la descarga termine, la aplicación se iniciará automáticamente. El servicio de IA comenzará
  a procesar los datos (por ejemplo, de una cámara conectada).


  **Verificando el estado**

  Puedes ver los logs del servicio de IA desde el panel de balenaCloud para asegurarte de que
  todo está funcionando correctamente y ver los resultados del modelo.

data:
  # Define la Raspberry Pi 4 de 64 bits como el dispositivo por defecto y soportado.
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - raspberrypi4-64