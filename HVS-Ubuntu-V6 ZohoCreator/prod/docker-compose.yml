version: '2.4'  # ¡IMPORTANTE! Versión mínima requerida

services:
  app:
    build: .
    privileged: true
    restart: always
    depends_on:
      - db
    environment:
      - APP_PATH=/app
      - INSIDE_CONTAINER=true
      - BBOX_MAX_ASPECT_RATIO
      - BRIGHTNESS_THRESHOLD
      - CALIBRATE_PIN
      - CAMERA_PATHS
      - CLASSIFICATION_MODEL_PATH
      - CORE_NAME_MAIN
      - ECCENTRIC_LEVER_AND_KO_CUP_MODEL_PATH
      - FOCUS_THRESHOLD
      - GCP_SA_B64
      - GOOGLE_CHAT_WEBHOOK_URL
      - KO_CUP_MODEL_PATH
      - LOCK_PIN_MODEL_PATH
      - LOCK_SHAFT_MODEL_PATH
      - MAIN_LOG_FILE
      - MIKASA_IP
      - MIKASA_PASSWORD
      - MIKASA_USERNAME
      - MIN_CONFIDENCE
      - RAM_ASSEMBLY_AND_DRIVE_BAR_MODEL_PATH
      - ROOT_PROYECT_NAME
      - SERVICE_ACCOUNT_PATH=/secrets/gcp_service_account.json
      - SHUT_DOWN_PIN
      - SPACE_ID
      - TURN_ON_PIN
      - ZENITHAL_ASSEMBLY_MODEL_PATH
      - SUCURSAL
      - RCLONE_CONFIG_GDRIVE_CLIENT_ID
      - RCLONE_CONFIG_GDRIVE_CLIENT_SECRET
      - RCLONE_CONFIG_GDRIVE_TEAM_DRIVE
      - RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_FILE
      - BRANCH
      # --- DB (el app registra los intentos en el contenedor `db`) ---
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=hollymatic
      - DB_USER=hollymatic
      - DB_PASSWORD

    labels:
      io.balena.features.supervisor-api: '1'
      io.balena.features.camera: '1'
    tmpfs:
      - /secrets:size=10m,mode=700
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video2:/dev/video2"
      - "/dev/video4:/dev/video4"
      - "/dev/gpiomem:/dev/gpiomem"
      
    volumes:
      - datos_de_app:/data  # Solo volumen persistente necesario

  # Base de datos MySQL con el esquema horneado (db/init/01_schema.sql).
  # Interna a la red de balena: NO se publica el puerto al host.
  db:
    build: ./db
    restart: always
    environment:
      - MYSQL_DATABASE=hollymatic
      - MYSQL_USER=hollymatic
      - MYSQL_ROOT_PASSWORD     # desde el dashboard de balena
      - MYSQL_PASSWORD          # desde el dashboard de balena
    volumes:
      - db_data:/var/lib/mysql

  # Agendador (APScheduler): apagado del KP200, recordatorio de limpieza y
  # reporte mensual de KPIs (lee la DB por la red interna, DB_HOST=db).
  scheduler:
    build: ./scheduler
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=hollymatic
      - DB_USER=hollymatic
      - DB_PASSWORD             # dashboard
      - DRIVE_FOLDER_ID         # dashboard
      - SERVICE_ACCOUNT_PATH=/secrets/gcp_service_account.json
      - GCP_SA_B64              # dashboard (lo hidrata scheduler/start.sh)
      - SPACE_ID
      - MIKASA_IP
      - MIKASA_USERNAME
      - MIKASA_PASSWORD
      - GOOGLE_CHAT_WEBHOOK_URL
      - ROOT_PROYECT_NAME
      - MAIN_LOG_FILE
      - CORE_NAME_MAIN
    tmpfs:
      - /secrets:size=10m,mode=700

  # API de calibración remota (FastAPI). Imagen ligera multiarch (corre en arm64/RPi4).
  # Controla el enchufe Kasa por la LAN; no usa db, cámara ni GPIO.
  # Variables inyectadas desde el dashboard de balena (Device/Fleet variables).
  api:
    build: ./api
    restart: always
    environment:
      - MIKASA_IP
      - MIKASA_USERNAME
      - MIKASA_PASSWORD
      - JWT_SECRET_KEY
      - ACCESS_TOKEN_EXPIRE_MINUTES
      - REFRESH_TOKEN_EXPIRE_DAYS
      - API_USERNAME
      - API_PASSWORD
      - API_PASSWORD_HASH
    ports:
      - "8000:8000"

volumes:
  datos_de_app: {}
  db_data: {}


